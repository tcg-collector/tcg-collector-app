name: Daily Health Check

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  health:
    name: Backend -- Daily Health Report
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        id: unit
        run: npx jest --testPathIgnorePatterns='/node_modules/' '\.integration\.' --ci --forceExit
        continue-on-error: true

      - name: Integration tests
        id: integration
        run: npx jest --testPathIgnorePatterns='/node_modules/' --testPathPattern='\.integration\.' --ci --forceExit
        continue-on-error: true

      - name: TypeScript typecheck
        id: typecheck
        run: npm run typecheck
        continue-on-error: true

      - name: Backend health check
        id: prod_health
        working-directory: .
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 https://tcg-collector-app-production.up.railway.app/health || echo "000")
          BODY=$(curl -s --max-time 10 https://tcg-collector-app-production.up.railway.app/health || echo '{"error":"timeout"}')
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "body=$BODY" >> $GITHUB_OUTPUT
          [ "$STATUS" != "200" ] && echo "Backend retornou HTTP $STATUS" && exit 1 || true
        continue-on-error: true

      - name: Vercel frontend check
        id: vercel_health
        working-directory: .
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://tcg-collector-app.vercel.app || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          [ "$STATUS" != "200" ] && echo "Vercel retornou HTTP $STATUS" && exit 1 || true
        continue-on-error: true

      - name: Generate health report
        if: always()
        working-directory: .
        run: |
          icon() { [ "$1" = "success" ] && echo "OK" || echo "FALHOU"; }
          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          # Bindex TCG - Relatorio Diario de Saude
          **Data:** $(date -u '+%d/%m/%Y %H:%M UTC')
          ## Resultados
          | Verificacao | Status |
          |------------|--------|
          | Testes unitarios | $(icon ${{ steps.unit.outcome }}) |
          | Testes de integracao | $(icon ${{ steps.integration.outcome }}) |
          | TypeScript typecheck | $(icon ${{ steps.typecheck.outcome }}) |
          | Backend Railway | $(icon ${{ steps.prod_health.outcome }}) HTTP ${{ steps.prod_health.outputs.status }} |
          | Frontend Vercel | $(icon ${{ steps.vercel_health.outcome }}) HTTP ${{ steps.vercel_health.outputs.status }} |
          ## Backend em producao
          ${{ steps.prod_health.outputs.body }}
          ---
          Roda todo dia as 09:00 BRT. Actions > Daily Health Check > Run workflow para rodar agora.
          SUMMARY

      - name: Fail if critical checks failed
        if: always()
        working-directory: .
        run: |
          FAILED=0
          [ "${{ steps.unit.outcome }}" != "success" ] && echo "Unit tests falharam" && FAILED=1
          [ "${{ steps.integration.outcome }}" != "success" ] && echo "Integration tests falharam" && FAILED=1
          [ "${{ steps.prod_health.outcome }}" != "success" ] && echo "Backend fora do ar" && FAILED=1
          [ "${{ steps.vercel_health.outcome }}" != "success" ] && echo "Vercel fora do ar" && FAILED=1
          [ $FAILED -eq 1 ] && exit 1 || echo "Todos os checks passaram"
