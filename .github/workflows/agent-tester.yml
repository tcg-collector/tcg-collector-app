name: Agent Tester (E2E Sintético)
run-name: "[Agent Tester] ${{ github.event.workflow_run.head_commit.message || 'manual' }}"

on:
  schedule:
    - cron: '15 12 * * *'   # 09:15 BRT diariamente
  workflow_run:
    workflows: ["CI"]        # roda após CI completar com sucesso em main
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  agent-tester:
    name: Agent Tester — 16 Rotas API
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Agent Tester
        env:
          AGENT_TESTER_BASE_URL: https://tcg-collector-app-production.up.railway.app
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          CLERK_TEST_USER_ID: ${{ secrets.CLERK_TEST_USER_ID }}
          CLERK_FRONTEND_API_URL: ${{ secrets.CLERK_FRONTEND_API_URL }}
        run: npx ts-node --project tsconfig.json src/scripts/agent-tester.ts
        id: agent
        continue-on-error: true

      - name: Fail if any route failed
        if: steps.agent.outcome == 'failure'
        run: |
          echo "❌ Agent Tester detectou falhas. Veja o relatório acima."
          exit 1
