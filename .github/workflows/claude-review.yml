name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'app/**/*.ts'
      - 'app/**/*.tsx'
      - 'backend/**/*.ts'

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    name: Claude review automático
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gerar diff dos arquivos TS/TSX
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- '*.ts' '*.tsx' > diff.txt
          LINES=$(wc -l < diff.txt)
          echo "lines=$LINES" >> $GITHUB_OUTPUT
          echo "Diff: $LINES linhas"

      - name: Rodar revisão com Claude
        if: steps.diff.outputs.lines > 0
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python3 .github/scripts/claude_review.py

      - name: Sem mudanças relevantes
        if: steps.diff.outputs.lines == 0
        run: echo "Nenhum arquivo TS/TSX alterado — review pulado."
