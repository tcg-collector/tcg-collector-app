name: Health Check

on:
  schedule:
    # 08:00 horário de Brasília (BRT = UTC-3) = 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  health:
    name: Verificar saúde do produto
    runs-on: ubuntu-latest

    steps:
      - name: Health check — Backend (Railway)
        run: |
          echo "Verificando backend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            https://tcg-collector-app-production.up.railway.app/health)
          echo "Backend status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Backend offline! HTTP $STATUS"
            exit 1
          fi
          echo "✅ Backend OK"

      - name: Health check — Frontend (Vercel)
        run: |
          echo "Verificando frontend..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            https://tcg-collector-app.vercel.app)
          echo "Frontend status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Frontend offline! HTTP $STATUS"
            exit 1
          fi
          echo "✅ Frontend OK"

      - name: Resumo
        if: success()
        run: |
          echo "🟢 $(date -u '+%Y-%m-%d %H:%M UTC') — Backend ✅  Frontend ✅"
